<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Zone Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/latest/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        input[type='number'] { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Training Zone Calculator</h1>
        <label for="age">Enter your age:</label>
        <input type="number" id="age" placeholder="Age" />

        <label for="restingHeartRate">Enter your resting heart rate:</label>
        <input type="number" id="restingHeartRate" placeholder="Resting Heart Rate" />

        <button onclick="calculateZones()">Calculate Training Zones</button>
        <button id="pdfButton">Export to PDF</button>

        <h2 id="output"></h2>
    </div>

    <script>
        function calculateZones() {
            const age = document.getElementById('age').value;
            const restingHR = document.getElementById('restingHeartRate').value;
            const maxHR = 220 - age;
            const zone1 = Math.round((maxHR - restingHR) * 0.55 + parseInt(restingHR));
            const zone2 = Math.round((maxHR - restingHR) * 0.70 + parseInt(restingHR));
            const zone3 = Math.round((maxHR - restingHR) * 0.85 + parseInt(restingHR));
            document.getElementById('output').innerHTML = `Zone 1: ${zone1} bpm<br>Zone 2: ${zone2} bpm<br>Zone 3: ${zone3} bpm`;
        }

        document.getElementById('pdfButton').onclick = function() {
            const element = document.querySelector('.container');
            html2pdf(element);
        };
    </script>
</body>
</html>
