<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RVSH Trainingszonenrechner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>

:root{
--blue:#1e73be;
--text:#333;
--bg:#f8f8f8;
--border:#e5e5e5;

--z1:#22c55e;
--z2:#84cc16;
--z3:#eab308;
--z4:#f97316;
--z5:#ef4444;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:"Open Sans",system-ui,Arial;
background:var(--bg);
color:var(--text);
}

header{
background:white;
border-bottom:3px solid var(--blue);
}

.container{
max-width:1100px;
margin:auto;
padding:16px;
}

.header-inner{
display:flex;
align-items:center;
gap:14px;
}

.logo{
height:50px;
}

h1{
margin:0;
font-size:22px;
}

.subtitle{
font-size:13px;
color:#666;
}

.layout{
display:grid;
grid-template-columns:1fr;
gap:20px;
margin-top:20px;
}

@media(min-width:900px){
.layout{
grid-template-columns:320px 1fr;
}
}

.card{
background:white;
border:1px solid var(--border);
border-radius:10px;
}

.card h2{
margin:0;
padding:12px 16px;
border-bottom:1px solid var(--border);
font-size:16px;
}

.card-content{
padding:16px;
}

label{
display:block;
font-weight:600;
margin-top:10px;
font-size:13px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid var(--border);
font-size:15px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

button{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid var(--border);
background:white;
cursor:pointer;
font-weight:600;
}

button.primary{
background:var(--blue);
color:white;
border-color:var(--blue);
}

.result-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.badge{
font-size:12px;
background:#e8f5e9;
padding:5px 10px;
border-radius:20px;
}

.chips{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.chip{
border:1px solid var(--border);
border-radius:8px;
padding:10px 14px;
min-width:120px;
}

.chip-value{
font-size:20px;
font-weight:700;
}

.zones{
display:grid;
gap:12px;
}

@media(min-width:900px){
.zones{
grid-template-columns:repeat(5,1fr);
}
}

.zone{
border-radius:8px;
overflow:hidden;
border:1px solid var(--border);
}

.zone-title{
color:white;
padding:8px;
font-weight:700;
text-align:center;
}

.zone-values{
font-size:22px;
font-weight:700;
text-align:center;
padding:14px;
background:#fafafa;
}

.zone-goal{
padding:10px;
font-size:13px;
color:#555;
text-align:center;
}

.z1 .zone-title{background:var(--z1)}
.z2 .zone-title{background:var(--z2)}
.z3 .zone-title{background:var(--z3)}
.z4 .zone-title{background:var(--z4)}
.z5 .zone-title{background:var(--z5)}

footer{
margin-top:30px;
background:#3a3a3a;
color:white;
font-size:12px;
padding:16px;
text-align:center;
}

.export-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:16px;
}

.export-header img{
height:45px;
}

@media print{
header,.controls,footer{
display:none;
}
}

</style>
</head>

<body>

<header>
<div class="container header-inner">
<img src="rish-header-logo.png" class="logo">
<div>
<h1>Trainingszonenrechner</h1>
<div class="subtitle">Ruderverband Schleswig-Holstein</div>
</div>
</div>
</header>

<main class="container">

<div class="layout">

<div class="card controls">
<h2>Eingaben</h2>

<div class="card-content">

<label>Name</label>
<input id="name" type="text" placeholder="Name">

<label>HFmax</label>
<input id="hfmax" type="number" value="170">

<label>Ruhepuls</label>
<input id="ruhe" type="number" value="52">

<div class="actions">

<button class="primary" onclick="calculate()">Berechnen</button>

<button onclick="exportPDF()">PDF</button>

<button onclick="window.print()">Drucken</button>

</div>

</div>
</div>

<div class="card" id="exportArea">

<div class="card-content">

<div class="export-header">

<img src="rish-header-logo.png">

<div>
<strong>Trainingszonen</strong><br>
RVSH
</div>

</div>

<div class="result-header">

<div><strong>Trainingsbereiche (bpm)</strong></div>

<div class="badge" id="status">bereit</div>

</div>

<div class="chips">

<div class="chip">
<div>Name</div>
<div class="chip-value" id="nameOut">-</div>
</div>

<div class="chip">
<div>HFmax</div>
<div class="chip-value" id="hfOut">170</div>
</div>

<div class="chip">
<div>Ruhepuls</div>
<div class="chip-value" id="ruheOut">52</div>
</div>

</div>

<div class="zones" id="zones"></div>

</div>

</div>

</div>

</main>

<footer>
© RVSH Trainingszonenrechner
</footer>

<script>

const zones = [

{name:"Z1",lo:0.50,hi:0.60,color:"z1",goal:"Regeneration"},
{name:"Z2",lo:0.60,hi:0.70,color:"z2",goal:"Grundlagenausdauer"},
{name:"Z3",lo:0.70,hi:0.80,color:"z3",goal:"GA2"},
{name:"Z4",lo:0.80,hi:0.90,color:"z4",goal:"Schwelle"},
{name:"Z5",lo:0.90,hi:1.00,color:"z5",goal:"Maximal"}

]

function karvonen(max,ruhe,f){

return Math.round((max-ruhe)*f+ruhe)

}

function calculate(){

const name=document.getElementById("name").value
const max=parseInt(document.getElementById("hfmax").value)
const ruhe=parseInt(document.getElementById("ruhe").value)

document.getElementById("nameOut").innerText=name||"-"
document.getElementById("hfOut").innerText=max
document.getElementById("ruheOut").innerText=ruhe

const container=document.getElementById("zones")
container.innerHTML=""

zones.forEach(z=>{

const lo=karvonen(max,ruhe,z.lo)
const hi=karvonen(max,ruhe,z.hi)

const el=document.createElement("div")

el.className="zone "+z.color

el.innerHTML=`
<div class="zone-title">${z.name}</div>
<div class="zone-values">${lo} – ${hi}</div>
<div class="zone-goal">${z.goal}</div>
`

container.appendChild(el)

})

document.getElementById("status").innerText="berechnet"

}

async function exportPDF(){

const area=document.getElementById("exportArea")

const canvas=await html2canvas(area,{scale:1.5,useCORS:true})

const img=canvas.toDataURL("image/jpeg",0.85)

const {jsPDF}=window.jspdf

const pdf=new jsPDF("p","mm","a4")

const w=pdf.internal.pageSize.getWidth()
const h=canvas.height*w/canvas.width

pdf.addImage(img,"JPEG",10,10,w-20,h)

pdf.save("Trainingszonen.pdf")

}

calculate()

</script>

</body>
</html>
