<html>
<head>
    <title>German Training Zone Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>German Training Zone Calculator</h1>
    <div>
        <label for="heartRate">Enter your heart rate:</label>
        <input type="number" id="heartRate" />
        <button id="calculateZones">Calculate Zones</button>
    </div>
    <div id="zonesDisplay">
        <h2>Your Training Zones:</h2>
        <p id="zone1"></p>
        <p id="zone2"></p>
        <p id="zone3"></p>
        <p id="zone4"></p>
        <p id="zone5"></p>
    </div>
    <button id="exportPDF">Export as PDF</button>
    <script src="script.js"></script>
</body>
</html>
